<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather</title>
 
</head>
<body>
    <style>/* Import modern font */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

/* Background (soft premium gradient) */
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
  color: #fff;
}

/* Main Card */
section {
  width: 380px;
  padding: 30px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* Search Container */
section > div:first-child {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

/* Input */
section input {
  flex: 1;
  padding: 12px 15px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 14px;
  transition: 0.3s;
}

/* Input focus */
section input:focus {
  border: 1px solid #38bdf8;
  background: rgba(255,255,255,0.15);
}

/* Placeholder */
section input::placeholder {
  color: #cbd5f5;
}

/* Button */
section button {
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

/* Button Hover */
section button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4);
}

/* Output Card */
#output {
  margin-top: 20px;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
  animation: fadeIn 0.5s ease;
}

/* Weather Icon */
#output img {
  width: 90px;
  margin: 10px 0;
}

/* City Name */
#output h2 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 8px;
}

/* Weather Text */
#output p {
  font-size: 14px;
  margin: 6px 0;
  color: #e2e8f0;
}

/* Subtle divider effect */
#output p:not(:last-child) {
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding-bottom: 5px;
}

#unit {
  margin-top: 10px;
  padding: 8px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

option {
 margin-top: 10px;
  padding: 8px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: black;
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Mobile */
@media (max-width: 420px) {
  section {
    width: 90%;
    padding: 20px;
  }
}


    </style>

    <section>
        <div>
            <input type="text" placeholder="enter the city name">
            <button>Search</button>
        </div>
        <select id="unit">
             <option value="metric">°C</option>
             <option value="imperial">°F</option>
             <option value="kelvin">°K</option>
            </select>
 
        <div id="output"></div>
    </section>
    
    <script src="weather.js"></script>
</body>
</html>
