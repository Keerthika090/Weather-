<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: #fff;
      padding: 30px 16px;
      transition: background 1s ease;
    }

    section { width: 420px; max-width: 100%; }

    /* Search */
    .search-row { display: flex; gap: 8px; margin-bottom: 10px; }

    input[type=text] {
      flex: 1;
      padding: 12px 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      outline: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 14px;
      transition: .3s;
    }
    input[type=text]:focus { border-color: #38bdf8; background: rgba(255,255,255,0.15); }
    input[type=text]::placeholder { color: #94a3b8; }

    .btn {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s ease;
      font-size: 14px;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(56,189,248,.4); }

    .btn-icon {
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: .3s;
      font-size: 16px;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.2); }

    /* Controls */
    .controls-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }

    select {
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    select option { background: #1e293b; color: #fff; }

    /* Recent dropdown */
    .recent-wrap { position: relative; flex: 1; }

    #recent-btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.1);
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #recent-btn:hover { background: rgba(255,255,255,0.15); }

    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      z-index: 100;
      display: none;
    }
    .dropdown.open { display: block; }

    .dropdown-item {
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: .2s;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: rgba(255,255,255,0.08); }
    .dropdown-item.muted { color: #64748b; cursor: default; }

    /* Cards */
    .card {
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      padding: 24px;
      margin-bottom: 14px;
      animation: fadeIn .5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Main weather card */
    .main-weather { text-align: center; }
    .city-name    { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
    .date-text    { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }
    .weather-icon { font-size: 64px; margin: 8px 0; line-height: 1; }
    .temp-main    { font-size: 52px; font-weight: 300; letter-spacing: -2px; }
    .description  { font-size: 14px; color: #cbd5e1; text-transform: capitalize; margin-top: 4px; }
    .feels        { font-size: 13px; color: #94a3b8; margin-top: 2px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 18px; }
    .stat       { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 10px; text-align: center; }
    .stat-icon  { font-size: 18px; margin-bottom: 4px; }
    .stat-val   { font-size: 15px; font-weight: 600; }
    .stat-lbl   { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    /* Extra info */
    .extra-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
    .extra-item { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
    .extra-lbl  { font-size: 12px; color: #94a3b8; }
    .extra-val  { font-size: 14px; font-weight: 500; }

    /* 5-day forecast */
    .forecast-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 12px; }
    .forecast-grid  { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .fc-day         { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 10px 6px; text-align: center; }
    .fc-day-name    { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
    .fc-icon        { font-size: 22px; margin-bottom: 6px; }
    .fc-high        { font-size: 14px; font-weight: 600; }
    .fc-low         { font-size: 12px; color: #94a3b8; }

    /* Skeleton loader */
    .skeleton { background: rgba(255,255,255,0.08); border-radius: 8px; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: .4; }
      50%       { opacity: .8; }
    }

    /* Error */
    .error-card { text-align: center; padding: 20px; }
    .error-icon { font-size: 36px; margin-bottom: 8px; }
    .retry-btn  {
      margin-top: 12px;
      padding: 8px 20px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: .2s;
    }
    .retry-btn:hover { background: rgba(255,255,255,0.1); }

    #output { display: none; }

    /* Mobile */
    @media (max-width: 440px) {
      section { width: 100%; }
      .forecast-grid { grid-template-columns: repeat(5, 1fr); gap: 4px; }
      .fc-day { padding: 8px 4px; }
    }
  </style>
</head>
<body>
  <section>
    <div class="search-row">
      <input type="text" id="cityInput" placeholder="Enter city name…">
      <button class="btn-icon" id="geoBtn" title="Use my location">📍</button>
      <button class="btn" id="searchBtn">Search</button>
    </div>
    <div class="controls-row">
      <select id="unit">
        <option value="metric">°C</option>
        <option value="imperial">°F</option>
        <option value="kelvin">K</option>
      </select>
      <div class="recent-wrap">
        <button id="recent-btn">Recent searches <span>▾</span></button>
        <div class="dropdown" id="recent-dropdown"></div>
      </div>
    </div>
    <div id="output"></div>
  </section>

  <script src="weather.js"></script>
</body>
</html>
